<!DOCTYPE html>
<html>
  <head>
    <title>Issue</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }

      .topbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 30px;
      }

      .userSection {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .userAvatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        object-fit: cover;
      }

      .issueImage {
        max-width: 800px;
        width: 100%;
        border-radius: 6px;
      }

      .comment {
        border-bottom: 1px solid #eee;
        padding: 10px 0;
      }

      .commentUser {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }

      .commentUser img {
        width: 24px;
        height: 24px;
        border-radius: 50%;
      }

      textarea {
        width: 100%;
        height: 80px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="userSection">
        <div id="loginBox">
          <div id="g_id_onload" data-client_id="608770921952-hkt587ujrjp4bg98eba2hhc7rumjjnid.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false">
          </div>
          <div class="g_id_signin"></div>
        </div>
        <img id="avatar" class="userAvatar" style="display:none">
        <span id="username"></span>
        <button id="logoutBtn" onclick="logout()" style="display:none">
          Sign out
        </button>
      </div>
    </div>
    <div id="image"></div>
    <button id="deleteBtn" style="display:none" onclick="deleteIssue()">
      Delete Issue
    </button>
    <h3>Comments</h3>
    <div id="comments"></div>
    <textarea id="comment"></textarea>
    <button onclick="send()">Post</button>
    <script>

      const API = "https://script.google.com/macros/s/AKfycbwKG2hl62rZU3Su57ZIThVYPggDObNotUt7EEC5j06yo9UZsjQsBx_WH6y3LoIl09v1/exec"

      const ADMIN_EMAIL = "nayakckg@gmail.com"

      let userEmail = localStorage.getItem("userEmail")
      let userName = localStorage.getItem("userName")
      let userPicture = localStorage.getItem("userPicture")


      function handleCredentialResponse(response) {

        const payload = JSON.parse(atob(response.credential.split('.')[1]))

        userEmail = payload.email
        userName = payload.name
        userPicture = payload.picture

        localStorage.setItem("userEmail", userEmail)
        localStorage.setItem("userName", userName)
        localStorage.setItem("userPicture", userPicture)

        location.reload()

      }


      if (userEmail) {

        document.getElementById("avatar").src = userPicture
        document.getElementById("avatar").style.display = "block"

        document.getElementById("username").innerText = userName

        document.getElementById("logoutBtn").style.display = "block"

        document.getElementById("loginBox").style.display = "none"

      }


      function logout() {

        localStorage.clear()
        location.reload()

      }


      /* ADMIN DELETE */

      if (userEmail == ADMIN_EMAIL) {
        document.getElementById("deleteBtn").style.display = "block"
      }


      const params = new URLSearchParams(window.location.search)
      const img = params.get("img")


      fetch(API + "?action=images")
        .then(r => r.json())
        .then(rows => {

          rows.forEach(r => {
            if (r[0] == img) {

              document.getElementById("image").innerHTML =
                `<img class="issueImage" src="${r[4]}">`

            }
          })

        })


      fetch(API + "?action=comments&img=" + img)
        .then(r => r.json())
        .then(data => {

          let html = ""

          data.forEach(c => {

            html += `
<div class="comment">

<div class="commentUser">
<img src="${c[3]}">
<b>${c[1]}</b>
</div>

<div>${c[4]}</div>

</div>
`

          })

          document.getElementById("comments").innerHTML = html

        })


      function send() {

        const text = document.getElementById("comment").value

        fetch(API, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify({
            action: "comment",
            image: img,
            user: userName,
            email: userEmail,
            avatar: userPicture,
            comment: text
          })
        })

        location.reload()

      }


      function deleteIssue() {

        fetch(API, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify({
            action: "deleteIssue",
            image: img,
            email: userEmail
          })
        })
          .then(() => {

            alert("Issue deleted")
            window.location.href = "index.html"

          })

      }

    </script>
  </body>
</html>
