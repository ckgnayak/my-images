<!DOCTYPE html>
<html>
  <head>
    <title>Issue</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .issueTitle {
        font-size: 18px;
        font-weight: bold;
      }

      .userSection {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .userAvatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        object-fit: cover;
      }

      .issueImage {
        max-width: 800px;
        width: 100%;
        border-radius: 6px;
      }

      .statusRow {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 12px 0 20px;
      }

      .badge {
        display: inline-block;
        color: white;
        font-size: 12px;
        font-weight: bold;
        padding: 4px 10px;
        border-radius: 3px;
      }

      .badge.OPEN {
        background: red;
      }

      .badge.IN-PROGRESS {
        background: orange;
      }

      .badge.RESOLVED {
        background: green;
      }

      select#statusSelect {
        padding: 4px 8px;
        font-size: 13px;
        border-radius: 4px;
        border: 1px solid #ccc;
        cursor: pointer;
      }

      button#statusSaveBtn {
        padding: 4px 12px;
        font-size: 13px;
        border-radius: 4px;
        border: none;
        background: #333;
        color: white;
        cursor: pointer;
      }

      .comment {
        border-bottom: 1px solid #eee;
        padding: 10px 0;
      }

      .commentUser {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }

      .commentUser img {
        width: 24px;
        height: 24px;
        border-radius: 50%;
      }

      textarea {
        width: 100%;
        height: 80px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="issueTitle" id="issueTitle">Loading...</div>
      <div class="userSection">
        <div id="loginBox">
          <div id="g_id_onload" data-client_id="608770921952-hkt587ujrjp4bg98eba2hhc7rumjjnid.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
          <div class="g_id_signin"></div>
        </div>
        <img id="avatar" class="userAvatar" style="display:none" />
        <span id="username"></span>
        <button id="logoutBtn" onclick="logout()" style="display:none">Sign out</button>
      </div>
    </div>
    <!-- Status row: badge + dropdown + save button -->
    <div class="statusRow">
      <span class="badge" id="statusBadge">...</span>
      <select id="statusSelect" style="display:none">
        <option value="OPEN">OPEN</option>
        <option value="IN PROGRESS">IN PROGRESS</option>
        <option value="RESOLVED">RESOLVED</option>
      </select>
      <button id="statusSaveBtn" style="display:none" onclick="updateStatus()">Save</button>
      <span id="statusMsg" style="font-size:13px;color:green"></span>
    </div>
    <div id="image"></div>
    <button id="deleteBtn" style="display:none" onclick="deleteIssue()">Delete Issue</button>
    <h3>Comments</h3>
    <div id="comments"></div>
    <textarea id="comment"></textarea>
    <button onclick="send()">Post</button>
    <script>
      const API = "https://script.google.com/macros/s/AKfycbwKG2hl62rZU3Su57ZIThVYPggDObNotUt7EEC5j06yo9UZsjQsBx_WH6y3LoIl09v1/exec"
      const ADMIN_EMAIL = "nayakckg@gmail.com"

      let userEmail = localStorage.getItem("userEmail")
      let userName = localStorage.getItem("userName")
      let userPicture = localStorage.getItem("userPicture")

      function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split(".")[1]))
        userEmail = payload.email
        userName = payload.name
        userPicture = payload.picture
        localStorage.setItem("userEmail", userEmail)
        localStorage.setItem("userName", userName)
        localStorage.setItem("userPicture", userPicture)
        location.reload()
      }

      if (userEmail) {
        document.getElementById("avatar").src = userPicture
        document.getElementById("avatar").style.display = "block"
        document.getElementById("username").innerText = userName
        document.getElementById("logoutBtn").style.display = "block"
        document.getElementById("loginBox").style.display = "none"
      }

      function logout() {
        localStorage.clear()
        location.reload()
      }

      if (userEmail == ADMIN_EMAIL) {
        document.getElementById("deleteBtn").style.display = "block"
        document.getElementById("statusSelect").style.display = "inline-block"
        document.getElementById("statusSaveBtn").style.display = "inline-block"
      }

      const params = new URLSearchParams(window.location.search)
      const img = params.get("img")

      /* ── LOAD IMAGE + TITLE + STATUS ── */
      fetch(API + "?action=images")
        .then(r => r.json())
        .then(rows => {
          rows.forEach(r => {
            if (r[0] == img) {
              const title = r[6] || r[0]
              const status = r[1] || "OPEN"

              document.getElementById("issueTitle").innerText = title
              document.title = title

              // Set badge
              const badge = document.getElementById("statusBadge")
              badge.innerText = status
              badge.className = "badge " + status.replace(" ", "-")

              // Pre-select dropdown
              document.getElementById("statusSelect").value = status

              document.getElementById("image").innerHTML =
                `<img class="issueImage" src="${r[4]}">`
            }
          })
        })

      /* ── UPDATE STATUS ── */
      async function updateStatus() {
        const newStatus = document.getElementById("statusSelect").value
        const msgEl = document.getElementById("statusMsg")
        msgEl.innerText = "Saving..."

        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({
              action: "updateStatus",
              image: img,
              status: newStatus,
              email: userEmail
            })
          })

          const json = await res.json()

          if (json.status === "ok") {
            // Update badge instantly
            const badge = document.getElementById("statusBadge")
            badge.innerText = newStatus
            badge.className = "badge " + newStatus.replace(" ", "-")
            msgEl.innerText = "✅ Updated"
            setTimeout(() => msgEl.innerText = "", 2000)
          } else {
            msgEl.innerText = "❌ " + (json.error || "Failed")
          }
        } catch (err) {
          msgEl.innerText = "❌ " + err.message
        }
      }

      /* ── LOAD COMMENTS ── */
      fetch(API + "?action=comments&img=" + encodeURIComponent(img))
        .then(r => r.json())
        .then(data => {
          let html = ""
          data.forEach(c => {
            html += `
              <div class="comment">
                <div class="commentUser">
                  <img src="${c[3]}">
                  <b>${c[1]}</b>
                </div>
                <div>${c[4]}</div>
              </div>
            `
          })
          document.getElementById("comments").innerHTML = html || "<p>No comments yet.</p>"
        })

      /* ── POST COMMENT ── */
      function send() {
        const text = document.getElementById("comment").value
        if (!text.trim()) return

        fetch(API, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "comment",
            image: img,
            user: userName,
            email: userEmail,
            avatar: userPicture,
            comment: text
          })
        }).then(() => location.reload())
      }

      /* ── DELETE ISSUE ── */
      function deleteIssue() {
        if (!confirm("Are you sure you want to delete this issue?")) return

        fetch(API, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "deleteIssue",
            image: img,
            email: userEmail
          })
        }).then(() => {
          alert("Issue deleted")
          window.location.href = "index.html"
        })
      }
    </script>
  </body>
</html>
