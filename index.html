<!DOCTYPE html>
<html>
  <head>
    <title>Issue Tracker</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 16px;
      }

      .card {
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 6px;
      }

      .imgwrap {
        position: relative;
      }

      img {
        width: 100%;
        border-radius: 4px;
      }

      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 3px;
      }

      .commentBadge {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: black;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="userBar" style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <img id="avatar" width="32" style="border-radius:50%">
      <span id="username"></span>
      <button onclick="logout()">Logout</button>
    </div>
    <h2>Issue Tracker</h2>
    <!-- GOOGLE LOGIN -->
    <div id="g_id_onload" data-client_id="608770921952-hkt587ujrjp4bg98eba2hhc7rumjjnid.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false">
    </div>
    <div class="g_id_signin"></div>
    <!-- UPLOAD SECTION -->
    <h3>Report Issue</h3>
    <input type="file" id="upload" accept="image/*">
    <button onclick="upload()">Submit Issue</button>
    <p id="uploadStatus"></p>
    <!-- GALLERY -->
    <h3>Issues</h3>
    <div class="grid" id="gallery"></div>
    <script>


      /* -----------------------
      CONFIG
      ----------------------- */

      const API = "https://script.google.com/macros/s/AKfycbwKG2hl62rZU3Su57ZIThVYPggDObNotUt7EEC5j06yo9UZsjQsBx_WH6y3LoIl09v1/exec"

      const gallery = document.getElementById("gallery")



      /* -----------------------
      USER INFO
      ----------------------- */

      let userEmail = localStorage.getItem("userEmail")
      let userName = localStorage.getItem("userName")
      let userPicture = localStorage.getItem("userPicture")



      /* -----------------------
      GOOGLE LOGIN
      ----------------------- */

      function handleCredentialResponse(response) {

        const payload = JSON.parse(atob(response.credential.split('.')[1]))

        userEmail = payload.email
        userName = payload.name
        userPicture = payload.picture

        localStorage.setItem("userEmail", userEmail)
        localStorage.setItem("userName", userName)
        localStorage.setItem("userPicture", userPicture)

        location.reload()

      }



      /* -----------------------
      UPLOAD REQUEST
      ----------------------- */

      function upload() {

        if (!userEmail) {
          alert("Please login first")
          return
        }

        const file = document.getElementById("upload").files[0]

        if (!file) {
          alert("Select an image first")
          return
        }

        document.getElementById("uploadStatus").innerText = "Uploading..."

        const reader = new FileReader()

        reader.onload = function () {

          fetch(API, {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({
              action: "uploadRequest",
              name: file.name,
              type: file.type,
              image: reader.result,
              user: userName,
              email: userEmail
            })
          })
            .then(r => r.text())
            .then(res => {

              document.getElementById("uploadStatus").innerText =
                "Upload submitted for admin approval"

            })
            .catch(err => {
              document.getElementById("uploadStatus").innerText = "Upload failed"
            })

        }

        reader.readAsDataURL(file)

      }



      /* -----------------------
      LOAD GALLERY
      ----------------------- */

      fetch(API + "?action=images")
        .then(r => r.json())
        .then(rows => {

          rows.forEach(r => {

            const name = r[0]
            const status = r[1]
            const url = r[4]

            let card = document.createElement("div")
            card.className = "card"

            card.innerHTML = `
<div class="imgwrap">

<span class="badge" id="status-${name}">
${status}
</span>

<span class="commentBadge" id="count-${name}">
💬 0
</span>

<a href="issue.html?img=${name}">
<img src="${url}">
</a>

</div>
`

            gallery.appendChild(card)



            /* STATUS COLOR */

            const badge = document.getElementById("status-" + name)

            if (status == "RESOLVED") {
              badge.style.background = "green"
            } else {
              badge.style.background = "red"
            }



            /* COMMENT COUNT */

            fetch(API + "?action=count&img=" + name)
              .then(r => r.text())
              .then(count => {
                document.getElementById("count-" + name).innerText = "💬 " + count
              })

          })

        })


    </script>
  </body>
</html>
