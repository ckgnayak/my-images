<!DOCTYPE html>
<html>
  <head>
    <title>Issue Tracker</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        margin-bottom: 30px;
      }

      .userSection {
        position: absolute;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .userAvatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 16px;
      }

      .card {
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 6px;
      }

      .issueImage {
        width: 100%;
        border-radius: 4px;
      }

      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: red;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 3px;
      }

      .commentBadge {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: black;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 3px;
      }

      .imgwrap {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h2>Issue Tracker</h2>
      <div class="userSection">
        <div id="loginBox">
          <div id="g_id_onload" data-client_id="608770921952-hkt587ujrjp4bg98eba2hhc7rumjjnid.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false">
          </div>
          <div class="g_id_signin"></div>
        </div>
        <img id="avatar" class="userAvatar" style="display:none">
        <span id="username"></span>
        <button id="logoutBtn" onclick="logout()" style="display:none">
          Sign out
        </button>
      </div>
    </div>
    <div id="uploadSection" style="display:none">
      <h3>Upload Issue</h3>
      <input type="file" id="upload">
      <button onclick="upload()">Upload</button>
      <p id="uploadStatus"></p>
    </div>
    <div class="grid" id="gallery"></div>
    <script>

      const API = "https://script.google.com/macros/s/AKfycbwKG2hl62rZU3Su57ZIThVYPggDObNotUt7EEC5j06yo9UZsjQsBx_WH6y3LoIl09v1/exec"

      let userEmail = localStorage.getItem("userEmail")
      let userName = localStorage.getItem("userName")
      let userPicture = localStorage.getItem("userPicture")



      function handleCredentialResponse(response) {

        const payload = JSON.parse(atob(response.credential.split('.')[1]))

        userEmail = payload.email
        userName = payload.name
        userPicture = payload.picture

        localStorage.setItem("userEmail", userEmail)
        localStorage.setItem("userName", userName)
        localStorage.setItem("userPicture", userPicture)

        location.reload()

      }



      if (userEmail) {

        document.getElementById("avatar").src = userPicture
        document.getElementById("avatar").style.display = "block"

        document.getElementById("username").innerText = userName

        document.getElementById("logoutBtn").style.display = "block"

        document.getElementById("loginBox").style.display = "none"

        document.getElementById("uploadSection").style.display = "block"

      }



      function logout() {

        localStorage.clear()
        location.reload()

      }



      /* UPLOAD FUNCTION */

      function upload() {

        const file = document.getElementById("upload").files[0]

        if (!file) {
          alert("Select image")
          return
        }

        document.getElementById("uploadStatus").innerText = "Uploading..."

        const reader = new FileReader()

        reader.onload = function () {

          const payload = {
            action: "upload",
            name: file.name,
            type: file.type,
            image: reader.result,
            user: userName,
            email: userEmail
          }

          fetch(API, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "text/plain"
            },
            body: JSON.stringify(payload)
          })

          document.getElementById("uploadStatus").innerText = "Upload sent"

          setTimeout(() => {
            location.reload()
          }, 1500)

        }

        reader.readAsDataURL(file)

      }



      /* LOAD GALLERY */

      fetch(API + "?action=images")
        .then(r => r.json())
        .then(rows => {

          rows.slice(1).forEach(r => {

            const name = r[0]
            const status = r[1]
            const url = r[4]

            let card = document.createElement("div")
            card.className = "card"

            card.innerHTML = `

<div class="imgwrap">

<span class="badge">${status}</span>

<span class="commentBadge" id="count-${name}">💬 0</span>

<a href="issue.html?img=${name}">
<img class="issueImage" src="${url}">
</a>

</div>

`

            gallery.appendChild(card)

            fetch(API + "?action=count&img=" + name)
              .then(r => r.text())
              .then(c => {
                document.getElementById("count-" + name).innerText = "💬 " + c
              })

          })

        })

    </script>
  </body>
</html>
