<!DOCTYPE html>
<html>
  <head>
    <title>Issue Images</title>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
      }

      .card {
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 6px;
      }

      .imgwrap {
        position: relative;
      }

      img {
        width: 100%;
        border-radius: 4px;
      }

      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: red;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h2>Issue Gallery</h2>
    <div class="grid" id="gallery"></div>
    <script>

      const repo = "ckgnayak/my-images"

      fetch(`https://api.github.com/repos/${repo}/contents`)
        .then(res => res.json())
        .then(files => {

          const gallery = document.getElementById("gallery")

          files.forEach(file => {

            if (file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {

              let card = document.createElement("div")
              card.className = "card"

              const API = "https://script.google.com/macros/s/AKfycbwKG2hl62rZU3Su57ZIThVYPggDObNotUt7EEC5j06yo9UZsjQsBx_WH6y3LoIl09v1/exec"

              card.innerHTML = `
              <div class="imgwrap">
              <span class="badge" id="status-${file.name}">...</span>
              <a href="issue.html?img=${file.name}">
              <img src="${file.download_url}">
              </a>
              </div>
              `

              gallery.appendChild(card)

              fetch(API + "?action=status&img=" + file.name)
                .then(r => r.text())
                .then(status => {

                  const badge = document.getElementById("status-" + file.name)

                  badge.innerText = status

                  if (status == "RESOLVED") {
                    badge.style.background = "green"
                  } else {
                    badge.style.background = "red"
                  }

                })

              gallery.appendChild(card)

            }

          })

        })

    </script>
  </body>
</html>
