<!DOCTYPE html>
<html>
  <head>
    <title>Issue Tracker</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial;
        margin: 0;
        padding: 0;
      }

      /* ── HEADER ── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: #003366;
        border-bottom: 4px solid #f5a623;
        padding: 14px 20px;
        margin-bottom: 30px;
      }

      .topbar h2 {
        color: white;
        margin: 0;
        font-size: 20px;
        letter-spacing: 1px;
      }

      .userSection {
        position: absolute;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .userAvatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid #f5a623;
      }

      #username {
        color: white;
        font-size: 14px;
      }

      #logoutBtn {
        background: transparent;
        border: 1px solid #f5a623;
        color: #f5a623;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }

      #logoutBtn:hover {
        background: #f5a623;
        color: #003366;
      }

      /* ── MAIN CONTENT ── */
      .content {
        padding: 0 20px 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 16px;
      }

      .card {
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 6px;
      }

      .issueImage {
        width: 100%;
        border-radius: 4px;
        display: block;
      }

      .issueTitle {
        margin: 6px 0 0;
        font-size: 13px;
        font-weight: bold;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        color: white;
        font-size: 12px;
        font-weight: bold;
        padding: 4px 6px;
        border-radius: 3px;
      }

      .badge.OPEN {
        background: red;
      }

      .badge.IN-PROGRESS {
        background: orange;
      }

      .badge.RESOLVED {
        background: green;
      }

      .commentBadge {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: black;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 3px;
      }

      .imgwrap {
        position: relative;
      }

      #uploadSection {
        margin-bottom: 24px;
      }

      #uploadSection h3 {
        color: #003366;
        margin-top: 0;
      }

      #uploadSection input[type="text"] {
        display: block;
        margin-bottom: 8px;
        padding: 6px 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 300px;
      }

      #uploadSection button {
        background: #003366;
        color: white;
        border: none;
        padding: 7px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        margin-top: 6px;
      }

      #uploadSection button:hover {
        background: #0055a5;
      }

      /* ── FOOTER ── */
      footer {
        background: #003366;
        border-top: 4px solid #f5a623;
        color: #cce0f5;
        text-align: center;
        padding: 16px 20px;
        font-size: 13px;
        margin-top: 40px;
      }

      footer a {
        color: #f5a623;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="topbar">
      <h2>⚡ Issue Tracker</h2>
      <div class="userSection">
        <div id="loginBox">
          <div id="g_id_onload" data-client_id="608770921952-hkt587ujrjp4bg98eba2hhc7rumjjnid.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
          <div class="g_id_signin"></div>
        </div>
        <img id="avatar" class="userAvatar" style="display:none" />
        <span id="username"></span>
        <button id="logoutBtn" onclick="logout()" style="display:none">Sign out</button>
      </div>
    </div>
    <!-- MAIN -->
    <div class="content">
      <div id="uploadSection" style="display:none">
        <h3>Upload Issue</h3>
        <input type="text" id="uploadTitle" placeholder="Issue title..." />
        <input type="file" id="upload" accept="image/*" />
        <button onclick="upload()">Upload</button>
        <p id="uploadStatus"></p>
      </div>
      <div class="grid" id="gallery"></div>
    </div>
    <!-- FOOTER -->
    <footer>
      &copy; 2026 Issue Tracker &nbsp;|&nbsp;
      <a href="mailto:nayakckg@gmail.com">Contact Admin</a>
      <br><br>
      Built and maintained by: <strong style="color:#f5a623">C.K.G (Gandhi) Nayak</strong>
    </footer>
    <script>
      const API = "https://script.google.com/macros/s/AKfycbwKG2hl62rZU3Su57ZIThVYPggDObNotUt7EEC5j06yo9UZsjQsBx_WH6y3LoIl09v1/exec"

      let userEmail = localStorage.getItem("userEmail")
      let userName = localStorage.getItem("userName")
      let userPicture = localStorage.getItem("userPicture")

      function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split(".")[1]))
        userEmail = payload.email
        userName = payload.name
        userPicture = payload.picture
        localStorage.setItem("userEmail", userEmail)
        localStorage.setItem("userName", userName)
        localStorage.setItem("userPicture", userPicture)
        location.reload()
      }

      if (userEmail) {
        document.getElementById("avatar").src = userPicture
        document.getElementById("avatar").style.display = "block"
        document.getElementById("username").innerText = userName
        document.getElementById("logoutBtn").style.display = "block"
        document.getElementById("loginBox").style.display = "none"
        document.getElementById("uploadSection").style.display = "block"
      }

      function logout() {
        localStorage.clear()
        location.reload()
      }

      /* ── UPLOAD ── */
      async function upload() {
        const file = document.getElementById("upload").files[0]
        if (!file) { alert("Select an image first"); return }

        const title = document.getElementById("uploadTitle").value.trim() || file.name
        const statusEl = document.getElementById("uploadStatus")
        statusEl.innerText = "Uploading..."

        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader()
          reader.onload = () => resolve(reader.result)
          reader.onerror = () => reject(reader.error)
          reader.readAsDataURL(file)
        })

        const payload = {
          action: "upload",
          name: file.name,
          type: file.type,
          image: base64,
          user: userName,
          email: userEmail,
          title: title
        }

        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
          })
          const json = await res.json()
          if (json.status === "ok") {
            statusEl.innerText = "✅ Uploaded!"
            setTimeout(() => location.reload(), 1500)
          } else {
            statusEl.innerText = "❌ Error: " + (json.error || JSON.stringify(json))
          }
        } catch (err) {
          statusEl.innerText = "❌ Upload failed: " + err.message
        }
      }

      /* ── GALLERY ── */
      fetch(API + "?action=images")
        .then(r => r.json())
        .then(rows => {
          rows.slice(1).forEach(r => {
            const name = r[0]
            const status = r[1]
            const url = r[4]
            const title = r[6] || name

            const card = document.createElement("div")
            card.className = "card"
            card.innerHTML = `
              <div class="imgwrap">
                <span class="badge ${status.replace(" ", "-")}">${status}</span>
                <span class="commentBadge" id="count-${name}">💬 0</span>
                <a href="issue.html?img=${encodeURIComponent(name)}">
                  <img class="issueImage" src="${url}" onerror="this.style.opacity=0.3">
                </a>
              </div>
              <p class="issueTitle">${title}</p>
            `
            document.getElementById("gallery").appendChild(card)

            fetch(API + "?action=count&img=" + encodeURIComponent(name))
              .then(r => r.json())
              .then(data => {
                const el = document.getElementById("count-" + name)
                if (el) el.innerText = "💬 " + (data.count !== undefined ? data.count : 0)
              })
              .catch(() => { })
          })
        })
        .catch(err => console.error("Gallery load error:", err))
    </script>
  </body>
</html>
