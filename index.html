<!DOCTYPE html>
<html>
  <head>
    <title>Issue Gallery</title>
    <style>
      /* Basic page styling */
      body {
        font-family: Arial;
        margin: 20px;
      }

      /* Grid layout for images */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 16px;
      }

      /* Card container */
      .card {
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 6px;
      }

      /* Wrapper so badges can be positioned on image */
      .imgwrap {
        position: relative;
      }

      /* Image styling */
      img {
        width: 100%;
        border-radius: 4px;
      }

      /* Status badge (OPEN / RESOLVED) */
      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: red;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 3px;
      }

      /* Comment count badge */
      .commentBadge {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: black;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h2>Issue Gallery</h2>
    <!-- Container where images will be inserted -->
    <div class="grid" id="gallery"></div>
    <script>


      /* ------------------------------------------
      CONFIGURATION
      ------------------------------------------ */


      /* GitHub repo where images are stored */

      const repo = "ckgnayak/my-images"


      /* Apps Script API endpoint */

      const API = "https://script.google.com/macros/s/AKfycbwKG2hl62rZU3Su57ZIThVYPggDObNotUt7EEC5j06yo9UZsjQsBx_WH6y3LoIl09v1/exec"


      /* Gallery container */

      const gallery = document.getElementById("gallery")



      /* ------------------------------------------
      LOAD IMAGES FROM GITHUB
      ------------------------------------------ */


      /* Fetch repo contents via GitHub API */

      fetch(`https://api.github.com/repos/${repo}/contents`)
        .then(res => res.json())
        .then(files => {


          files.forEach(file => {


            /* Only process image files */

            if (file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {



              /* Create card container */

              let card = document.createElement("div")
              card.className = "card"



              /* Insert image and badges */

              card.innerHTML = `
<div class="imgwrap">

<span class="badge" id="status-${file.name}">
...
</span>

<span class="commentBadge" id="count-${file.name}">
💬 0
</span>

<a href="issue.html?img=${file.name}">
<img src="${file.download_url}">
</a>

</div>
`


              /* Add card to gallery */

              gallery.appendChild(card)



              /* ------------------------------------------
              FETCH ISSUE STATUS
              ------------------------------------------ */

              fetch(API + "?action=status&img=" + file.name)
                .then(r => r.text())
                .then(status => {

                  const badge = document.getElementById("status-" + file.name)

                  badge.innerText = status

                  /* Color badge */

                  if (status == "RESOLVED") {
                    badge.style.background = "green"
                  } else {
                    badge.style.background = "red"
                  }

                })



              /* ------------------------------------------
              FETCH COMMENT COUNT
              ------------------------------------------ */

              fetch(API + "?action=count&img=" + file.name)
                .then(r => r.text())
                .then(count => {

                  document.getElementById("count-" + file.name).innerText = "💬 " + count

                })



            }


          })


        })


    </script>
  </body>
</html>
