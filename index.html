<!DOCTYPE html>
<html>
  <head>
    <title>Issue Images</title>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
      }

      .card {
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 6px;
      }

      .imgwrap {
        position: relative;
      }

      img {
        width: 100%;
        border-radius: 4px;
      }

      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: red;
        color: white;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h2>Issue Gallery</h2>
    <div class="grid" id="gallery"></div>
    <script>

      const repo = "ckgnayak/my-images"

      fetch(`https://api.github.com/repos/${repo}/contents`)
        .then(res => res.json())
        .then(files => {

          const gallery = document.getElementById("gallery")

          files.forEach(file => {

            if (file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {

              let card = document.createElement("div")
              card.className = "card"

              card.innerHTML = `
<div class="imgwrap">
<span class="badge">OPEN</span>
<img src="${file.download_url}">
</div>
`

              gallery.appendChild(card)

            }

          })

        })

    </script>
  </body>
</html>
